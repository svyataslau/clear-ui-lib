<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
        }

        /* Input Styles */
        .input {
            max-width: 200px;
            min-height: 40px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
            background: #e8e8e8;
            box-shadow: 5px 5px 17px #c8c8c8,
                       -5px -5px 17px #ffffff;
            border: none;
            border-radius: 10px;
            transition: all .5s;
        }

        .input:focus {
            background: #e8e8e8;
            box-shadow: inset 5px 5px 17px #c8c8c8,
                      inset -5px -5px 17px #ffffff;
        }

        /* Card Styles */
        .card {
            width: 190px;
            height: 254px;
            border-radius: 30px;
            background: #e0e0e0;
            box-shadow: 15px 15px 30px #bebebe,
                       -15px -15px 30px #ffffff;
        }

        /* Button Styles */
        .cssbuttons-io {
            position: relative;
            font-family: inherit;
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 0.05em;
            border-radius: 0.8em;
            cursor: pointer;
            border: none;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: ghostwhite;
            overflow: hidden;
        }

        .cssbuttons-io svg {
            width: 1.2em;
            height: 1.2em;
            margin-right: 0.5em;
        }

        .cssbuttons-io span {
            position: relative;
            z-index: 10;
            transition: color 0.4s;
            display: inline-flex;
            align-items: center;
            padding: 0.8em 1.2em 0.8em 1.05em;
        }

        .cssbuttons-io::before,
        .cssbuttons-io::after {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .cssbuttons-io::before {
            content: "";
            background: #000;
            width: 120%;
            left: -10%;
            transform: skew(30deg);
            transition: transform 0.4s cubic-bezier(0.3, 1, 0.8, 1);
        }

        .cssbuttons-io:hover::before {
            transform: translate3d(100%, 0, 0);
        }

        .cssbuttons-io:active {
            transform: scale(0.95);
        }

        /* Switch Component Styles */
        .switch-container {
            position: relative;
            width: 150px;
            height: 60px;
            background: rgb(236 240 243);
            border-radius: 50px;
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff;
        }

        .toggle-checkbox {
            display: none;
        }

        .switch {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateY(-50%);
            border-radius: 50px;
            overflow: hidden;
            cursor: pointer;
        }

        .toggle {
            position: absolute;
            width: 80px;
            height: 50px;
            background: linear-gradient(145deg, #d2d2d2, #ffffff);
            border-radius: 50px;
            top: 5px;
            left: 5px;
            box-shadow:
                -4px -4px 8px #ffffff,
                4px 4px 8px #c8c8c8;
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10px;
        }

        .led {
            width: 10px;
            height: 10px;
            background: grey;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease-in-out;
        }

        .toggle-checkbox:checked + .switch .toggle {
            left: 65px;
            background: linear-gradient(308deg, #ffffff, #d2d2d2);
            box-shadow:
                -4px -4px 8px #ffffff,
                4px 4px 8px #c8c8c8;
        }

        .toggle-checkbox:checked + .switch .led {
            background: yellow;
            box-shadow: 0 0 15px 4px yellow;
        }

        .switch:hover .toggle {
            box-shadow:
                -4px -4px 12px #ffffff,
                4px 4px 12px #c8c8c8;
        }
    </style>

<body class="bg-neumorphism-background font-courier">

    <script type="text/babel">
        // Import the library (we'll use a CDN version for demo)
        // In real usage, you would import from the built library
        
        // Mock components for demo
        const Button = ({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', ...props }) => {
            const sizeClasses = {
                sm: 'px-3 py-1.5 text-sm',
                md: 'px-4 py-2 text-base',
                lg: 'px-6 py-3 text-lg',
                xl: 'px-8 py-4 text-xl',
                circle: 'w-20 h-20 text-2xl',
                'circle-lg': 'w-24 h-24 text-3xl',
                'circle-xl': 'w-32 h-32 text-4xl',
            };

            const variantClasses = {
                primary: 'bg-neumorphism-background text-gray-700 shadow-neumorphism hover:shadow-neumorphism-pressed active:shadow-neumorphism-inset transition-all duration-200',
                secondary: 'bg-neumorphism-background text-gray-600 shadow-neumorphism hover:shadow-neumorphism-pressed active:shadow-neumorphism-inset transition-all duration-200',
                outline: 'bg-neumorphism-background text-gray-600 shadow-neumorphism hover:shadow-neumorphism-pressed active:shadow-neumorphism-inset transition-all duration-200',
                ghost: 'bg-transparent text-gray-600 hover:bg-neumorphism-background hover:shadow-neumorphism transition-all duration-200',
                convex: 'bg-neumorphism-classic text-gray-700 shadow-neumorphism-convex hover:shadow-neumorphism-pressed active:shadow-neumorphism-inset transition-all duration-200',
                concave: 'bg-neumorphism-classic text-gray-700 shadow-neumorphism-concave hover:shadow-neumorphism-pressed active:shadow-neumorphism-inset transition-all duration-200',
                gradient: 'cssbuttons-io',
            };

            const isCircle = size === 'circle' || size === 'circle-lg' || size === 'circle-xl';
            const isGradient = variant === 'gradient';

            if (isGradient) {
                return (
                    <button
                        disabled={disabled}
                        onClick={onClick}
                        className={`${variantClasses[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
                        {...props}
                    >
                        <span>{children}</span>
                    </button>
                );
            }

            return (
                <button
                    disabled={disabled}
                    onClick={onClick}
                    className={`inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed ${sizeClasses[size]} ${variantClasses[variant]} ${isCircle ? 'rounded-full aspect-square' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Input = ({ type = 'text', placeholder, value, onChange, disabled = false, error = false, size = 'md', className = '', useCustomStyle = false, ...props }) => {
            const handleChange = (e) => {
                onChange?.(e.target.value);
            };

            if (useCustomStyle) {
                return (
                    <input
                        type={type}
                        placeholder={placeholder}
                        value={value}
                        onChange={handleChange}
                        disabled={disabled}
                        className={`input ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
                        {...props}
                    />
                );
            }

            const sizeClasses = {
                sm: 'px-3 py-1.5 text-sm',
                md: 'px-4 py-2 text-base',
                lg: 'px-6 py-3 text-lg',
                xl: 'px-8 py-4 text-xl',
            };

            return (
                <input
                    type={type}
                    placeholder={placeholder}
                    value={value}
                    onChange={handleChange}
                    disabled={disabled}
                    className={`w-full rounded-xl bg-neumorphism-background text-gray-700 placeholder-gray-500 transition-all duration-200 focus:outline-none shadow-neumorphism-input disabled:opacity-50 disabled:cursor-not-allowed ${sizeClasses[size]} ${error ? 'shadow-neumorphism-pressed' : ''} ${className}`}
                    {...props}
                />
            );
        };

        const Card = ({ children, variant = 'default', padding = 'md', className = '', useCustomStyle = false, ...props }) => {
            if (useCustomStyle) {
                return (
                    <div className={`card ${className}`} {...props}>
                        {children}
                    </div>
                );
            }

            const variantClasses = {
                default: 'bg-neumorphism-background shadow-neumorphism-card',
                elevated: 'bg-neumorphism-background shadow-neumorphism',
                outlined: 'bg-neumorphism-background shadow-neumorphism-inset',
            };

            const paddingClasses = {
                sm: 'p-3',
                md: 'p-4',
                lg: 'p-6',
                xl: 'p-8',
            };

            return (
                <div
                    className={`rounded-2xl transition-all duration-200 ${variantClasses[variant]} ${paddingClasses[padding]} ${className}`}
                    {...props}
                >
                    {children}
                </div>
            );
        };

        const Switch = ({ checked = false, onChange, disabled = false, className = '', ...props }) => {
            const handleChange = (e) => {
                onChange?.(e.target.checked);
            };

            return (
                <div className={`switch-container ${className}`} {...props}>
                    <input
                        type="checkbox"
                        className="toggle-checkbox"
                        checked={checked}
                        onChange={handleChange}
                        disabled={disabled}
                    />
                    <label className="switch">
                        <div className="toggle">
                            <div className="led"></div>
                        </div>
                    </label>
                </div>
            );
        };

        const Avatar = ({ src, alt, size = 'md', fallback, className = '', ...props }) => {
            const sizeClasses = {
                sm: 'w-8 h-8 text-sm',
                md: 'w-10 h-10 text-base',
                lg: 'w-12 h-12 text-lg',
                xl: 'w-16 h-16 text-xl',
            };

            const getInitials = (name) => {
                return name
                    .split(' ')
                    .map(word => word.charAt(0))
                    .join('')
                    .toUpperCase()
                    .slice(0, 2);
            };

            const fallbackText = fallback ? getInitials(fallback) : '?';

            return (
                <div
                    className={`inline-flex items-center justify-center rounded-full bg-neumorphism-background text-gray-600 font-medium overflow-hidden shadow-neumorphism ${sizeClasses[size]} ${className}`}
                    {...props}
                >
                    {src ? (
                        <img
                            src={src}
                            alt={alt}
                            className="w-full h-full object-cover"
                        />
                    ) : (
                        <span className="flex items-center justify-center w-full h-full">
                            {fallbackText}
                        </span>
                    )}
                </div>
            );
        };

        const Typography = ({ children, variant = 'body', color = 'primary', weight, className = '', ...props }) => {
            const variantClasses = {
                h1: 'text-4xl font-bold',
                h2: 'text-3xl font-bold',
                h3: 'text-2xl font-semibold',
                h4: 'text-xl font-semibold',
                h5: 'text-lg font-medium',
                h6: 'text-base font-medium',
                subtitle: 'text-lg text-gray-600',
                body: 'text-base',
                caption: 'text-sm text-gray-500',
            };

            const colorClasses = {
                primary: 'text-gray-900',
                secondary: 'text-gray-600',
                accent: 'text-accent-600',
                gray: 'text-gray-500',
            };

            const weightClasses = {
                normal: 'font-normal',
                medium: 'font-medium',
                semibold: 'font-semibold',
                bold: 'font-bold',
            };

            const variantElements = {
                h1: 'h1',
                h2: 'h2',
                h3: 'h3',
                h4: 'h4',
                h5: 'h5',
                h6: 'h6',
                subtitle: 'p',
                body: 'p',
                caption: 'span',
            };

            const Element = variantElements[variant];

            return React.createElement(Element, {
                className: `${variantClasses[variant]} ${colorClasses[color]} ${weight ? weightClasses[weight] : ''} ${className}`,
                ...props
            }, children);
        };

                                        <Typography variant="h3">Heading 3 - Subsection</Typography>
                                        <Typography variant="h4">Heading 4 - Card Title</Typography>
                                        <Typography variant="subtitle">Subtitle - Descriptive text</Typography>
                                        <Typography variant="body">Body - Regular paragraph text</Typography>
                                        <Typography variant="caption">Caption - Small helper text</Typography>
                                    </div>
                                </Card>
                            </section>

                            {/* Interactive Demo */}
                            <section>
                                <Typography variant="h2" className="text-2xl font-bold text-gray-900 mb-6">
                                    Interactive Demo
                                </Typography>
                                <Card variant="elevated" padding="lg">
                                    <div className="space-y-6">
                                        <Typography variant="h4">Create a Post</Typography>
                                        <div className="space-y-4">
                                            <Input
                                                placeholder="Post title"
                                                value={inputValue}
                                                onChange={setInputValue}
                                            />
                                            <textarea
                                                placeholder="Write your post content..."
                                                rows={4}
                                                className="w-full px-4 py-2 rounded-xl bg-neumorphism-background shadow-neumorphism-input focus:outline-none"
                                            />
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-3">
                                                    <Avatar fallback="You" size="md" />
                                                    <Typography variant="body">Your post</Typography>
                                                </div>
                                                <div className="flex space-x-3">
                                                    <Button variant="outline">Cancel</Button>
                                                    <Button variant="gradient">Publish</Button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            </section>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<DemoApp />, document.getElementById('root'));
    </script>
</body>
</html>
